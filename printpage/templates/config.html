<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Printer Settings</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/app.css">
    <script defer src="/static/config.js"></script>
  </head>
  <body class="min-h-screen">
    <main class="mx-auto max-w-6xl p-6">
      <div class="mb-6 flex items-center justify-between">
        <div>
          <h1 class="text-xl font-semibold tracking-[0.16em] uppercase text-stone-900">Printer settings</h1>
          <p class="mt-1 text-sm text-stone-500">Choose the active CUPS queue for print jobs.</p>
        </div>
        <a href="/" class="nav-button nav-button--secondary">Back to labels</a>
      </div>

      <div class="grid gap-4 lg:grid-cols-[22rem_minmax(0,1fr)]">
        <section class="panel-card p-4">
          <form id="config-form" class="space-y-4">
            <label class="block">
              <span class="app-label">Queue</span>
              <select id="queue_name" name="queue_name" class="app-input pr-8"></select>
            </label>

            <div class="grid gap-2">
              <button type="submit" class="nav-button nav-button--primary w-full">Save queue</button>
              <button type="button" id="refresh-button" class="nav-button nav-button--secondary w-full">
                Refresh queues
              </button>
            </div>

            <p id="status" data-state="idle" class="min-h-5 text-sm text-stone-500 data-[state=error]:text-red-600">
              Loading queues...
            </p>
          </form>
        </section>

        <section class="panel-card p-4">
          <h2 class="text-sm font-semibold tracking-[0.16em] uppercase text-stone-900">Current queue state</h2>
          <pre id="config-state" class="mt-4 overflow-auto rounded-xl bg-stone-950 p-4 font-mono text-sm leading-6 text-stone-100">Loading...</pre>
        </section>
      </div>
    </main>
  </body>
</html>
