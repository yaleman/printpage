<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Printer Settings</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 1rem;
      line-height: 1.4;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1rem;
    }

    .panel {
      border: 1px solid #8884;
      border-radius: 8px;
      padding: 1rem;
    }

    label {
      display: block;
      margin-top: 0.75rem;
      font-weight: 600;
    }

    select,
    button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 0.25rem;
      padding: 0.6rem;
      font: inherit;
    }

    .actions {
      display: grid;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .status,
    pre {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      min-height: 1.5rem;
      margin-top: 1rem;
    }

    .nav-link {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
    </head>
    <body>
        <div class="topbar">
            <h1>Printer Settings</h1>
            <a class="nav-link" href="/">Back to labels</a>
        </div>

        <div class="layout">
            <div class="panel">
                <form id="config-form">
                    <label for="queue_name">Queue</label>
                    <select id="queue_name" name="queue_name"></select>

                    <div class="actions">
                        <button type="submit">Save queue</button>
                        <button type="button" id="refresh-button">Refresh queues</button>
                    </div>

                    <div class="status" id="status"></div>
                </form>
            </div>

            <div class="panel">
                <h2>Current Queue State</h2>
                <pre id="config-state">Loading...</pre>
            </div>
        </div>

        <script>
    const configForm = document.getElementById("config-form");
    const queueSelect = document.getElementById("queue_name");
    const refreshButton = document.getElementById("refresh-button");
    const statusEl = document.getElementById("status");
    const configStateEl = document.getElementById("config-state");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "crimson" : "";
    }

    function renderConfig(data) {
      queueSelect.innerHTML = "";
      (data.queues || []).forEach((queue) => {
        const option = document.createElement("option");
        option.value = queue;
        option.textContent = queue;
        if (queue === data.queue_name) {
          option.selected = true;
        }
        queueSelect.appendChild(option);
      });
      configStateEl.textContent = JSON.stringify(data, null, 2);
    }

    async function fetchConfig(method = "GET", payload = null) {
      const response = await fetch("/api/config", {
        method,
        headers: {
          "Content-Type": "application/json",
        },
        body: payload ? JSON.stringify(payload) : null,
      });
      const result = await response.json();
      if (!response.ok) {
        throw new Error(JSON.stringify(result, null, 2));
      }
      return result;
    }

    async function loadConfig() {
      setStatus("Loading queues...");

      try {
        const result = await fetchConfig();
        renderConfig(result);
        setStatus("Queues loaded.");
      } catch (error) {
        console.error(error);
        setStatus(error.message, true);
      }
    }

    configForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("Saving queue...");

      try {
        const result = await fetchConfig("POST", { queue_name: queueSelect.value });
        renderConfig(result);
        setStatus("Queue saved.");
      } catch (error) {
        console.error(error);
        setStatus(error.message, true);
      }
    });

    refreshButton.addEventListener("click", loadConfig);

    loadConfig();
  </script>
    </body>
</html>
