<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <style>
    @page {
      size: 62mm 29mm;
      margin: 2mm;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    .label {
      width: 58mm;
      height: 25mm;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .title {
      font-size: 12pt;
      font-weight: 700;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 8pt;
      margin-top: 1mm;
    }

    .body {
      font-size: 7pt;
      margin-top: 1mm;
      white-space: pre-wrap;
    }
  </style>
    </head>
    <body>
        <div class="label">
            <div class="title">{{ title }}</div>
            {% if subtitle %}
            <div class="subtitle">{{ subtitle }}</div>
            {% endif %}
            {% if body %}
            <div class="body">{{ body }}</div>
            {% endif %}
        </div>
    </body>
</html>
